version: "3.11"
services:
  db:
    image: mysql:latest
    container_name: db
    restart: 'always'
    volumes:
      - mydata:/var/lib/mysql
    environment: 
      MYSQL_ROOT_PASSWORD: root_password@mysql
      MYSQL_DATABASE: new-mysql
      MYSQL_PASSWORD: root_password@mysql
      MYSQL_USER: root
    ports:
      - "8080:3306"    
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "db", "-u", "root", "-proot_password@mysql"] 
      timeout: 20s
      retries: 10
      interval: 10s
      
  # Redis
  redis-james-django-chukwu:
    image: redis:alpine
    container_name: redis
    ports:
      - "6379:6379"
    volumes:
      - mydata:/app/data

  # myApp
  cron-z2y-django:
    build: ./
    #image: $Z2Y_IMAGE
    container_name: cron-z2y-django
    volumes:
      - mydata:/app/data
      - static:/app/staticfiles
      - media:/app/media
    ports:
      - "8088:80"
    
    depends_on:
      db: 
        condition: service_healthy   
    #env_file:
     # - .env
    #environment:
     # - DJANGO_SUPERUSER_USERNAME=${DJANGO_SUPERUSER_USERNAME}
      #- DJANGO_SUPERUSER_EMAIL=${DJANGO_SUPERUSER_EMAIL
      #- DJANGO_SUPERUSER_PASSWORD=${DJANGO_SUPERUSER_PASSWORD}

  # Celery
  celery:
    restart: always
    build: ./
    container_name: celery
    command: celery -A backend worker -l INFO
    depends_on:
      - redis-james-django-chukwu
      - cron-z2y-django
    volumes:
      - mydata:/app/data

volumes:
  mydata:
  static:
  media:
