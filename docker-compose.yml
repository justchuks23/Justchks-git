version: "3.11"
services:
  db:
    image: mysql:latest
    container_name: new-mysql
    restart: 'unless-stopped'
    volumes:
      - mydata:/var/lib/mysql
    ports:
      - "4449:3306"    
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "mysql", "-u", "root", "-padmin"] 
      timeout: 20s
      retries: 10
    environment: 
      MYSQL_ROOT_PASSWORD: root_password@mysql
      MYSQL_DATABASE: mydjango-database
      MYSQL_USER: root
      
   
  backend:
    build: 
      context: .
      dockerfile: Dockerfile
    container_name: app_backend
    depends_on:
      db: 
        condition: service_healthy   
    volumes:
      - "./wait-for-it.sh:/home/wait-for-it.sh"
    entrypoint:
      - "/home/wait-for-it.sh"
      - "mysql:3306"
      - "-t"
      - "30"
      - "--"
      - "./docker-entrypoint.sh"
    ports:
      - "5001:80"
    env_file:
      - .env

  # Redis
  redis-james-django-chukwu:
    image: redis:alpine
    container_name: redis
    ports:
      - "6379:6379"
    volumes:
      - mydata:/app/data

  # myApp
  cron-z2y-django:
    build: ./
    image: $Z2Y_IMAGE
    container_name: cron-z2y-django
    volumes:
      - mydata:/app/data
      - static:/app/staticfiles
      - media:/app/media
    ports:
      - "5000:80"
    #env_file:
     # - .env
    #environment:
     # - DJANGO_SUPERUSER_USERNAME=${DJANGO_SUPERUSER_USERNAME}
      #- DJANGO_SUPERUSER_EMAIL=${DJANGO_SUPERUSER_EMAIL}
      #- DJANGO_SUPERUSER_PASSWORD=${DJANGO_SUPERUSER_PASSWORD}

  # Celery
  celery:
    restart: always
    build: ./
    container_name: celery
    command: celery -A backend worker -l INFO
    depends_on:
      - redis-james-django-chukwu
      - cron-z2y-django
    volumes:
      - mydata:/app/data

volumes:
  mydata:
  static:
  media:
