WSGIPythonPath /django_app
WSGIPassAuthorization On
Listen 8081

<VirtualHost *:80>
        ServerAdmin admin@gmail.com
        ServerName localhost
        DocumentRoot /django_app
        ErrorLog ${APACHE_LOG_DIR}/error.log
        CustomLog ${APACHE_LOG_DIR}/access.log combined

        # Set up WSGI process with virtual environment path
        WSGIDaemonProcess myapp python-home=/home/justin_chuk/zoom-integrate/venv python-path=/home/justin_chuk/zoom-integrate/
        WSGIProcessGroup myapp
        WSGIScriptAlias / /home/justin_chuk/zoom-integrate/zoom-youtube-integration/backend/wsgi.py
        
        Alias /static /django_app/static
        <Directory /django_app/static>
                Require all granted
        </Directory>
    
	<Directory /django_app/backend/>
		<Files wsgi.py>
			Require all granted
		</Files>
	</Directory>   
	WSGIApplicationGroup %{GLOBAL}     
        WSGIScriptAlias / /django_app/backend/wsgi.py
</VirtualHost>
